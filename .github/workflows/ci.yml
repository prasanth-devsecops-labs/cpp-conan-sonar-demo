name: C++ Conan Sonar Pipeline

on:
workflow_dispatch:
push:
branches:
- main


jobs:

build-and-scan:

```
runs-on: ubuntu-latest

steps:

  - name: Checkout
    uses: actions/checkout@v4

  - name: Install Conan
    run: |
      pip install conan

  - name: Detect Conan Profile
    run: |
      conan profile detect --force

  - name: Install Dependencies
    run: |
      conan install . \
        --output-folder=build \
        --build=missing \
        -s build_type=Release

  - name: Configure CMake
    run: |
      cmake -S . -B build/Release \
        -DCMAKE_TOOLCHAIN_FILE=build/build/Release/generators/conan_toolchain.cmake \
        -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
        -DCMAKE_BUILD_TYPE=Release

  - name: Build
    run: |
      cmake --build build/Release

  - name: Install SonarScanner
    run: |
      wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-7.0.2.4839-linux-x64.zip
      unzip sonar-scanner-cli-7.0.2.4839-linux-x64.zip
      mv sonar-scanner-7.0.2.4839-linux-x64 sonar-scanner

  - name: Sonar Scan
    run: |
      ./sonar-scanner/bin/sonar-scanner \
        -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
        -Dsonar.token=${{ secrets.SONAR_TOKEN }}
```

