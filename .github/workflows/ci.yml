name: C++ Conan Sonar Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Required so CMake can find a C++ compiler to generate "Unix Makefiles"
      - name: Install Build Essentials
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Conan
        run: |
          pip install conan

      - name: Detect Conan Profile
        run: |
          conan profile detect --force

      # Conan installs outputs to the 'build' folder using the CMakeDeps / CMakeToolchain generators
      - name: Install Dependencies
        run: |
          conan install . \
            --output-folder=build \
            --build=missing \
            -s build_type=Release

      # Syntax corrected and toolchain path set to where Conan actually generates it
      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_TOOLCHAIN_FILE=build/generators/conan_toolchain.cmake \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build

      - name: Install SonarScanner
        run: |
          wget https://sonarsource.com
          unzip sonar-scanner-cli-7.0.2.4839-linux-x64.zip
          mv sonar-scanner-7.0.2.4839-linux-x64 sonar-scanner

      - name: Sonar Scan
        run: |
          ./sonar-scanner/bin/sonar-scanner \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.cfamily.compile-commands=build/compile_commands.json
